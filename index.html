<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kochi 库存盘点</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh}
input,select,textarea{font-size:16px!important}
button{-webkit-appearance:none;touch-action:manipulation}
/* LOGIN */
.lo{position:fixed;top:0;left:0;right:0;bottom:0;background:#1c1c1e;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.lo-brand{font-size:32px;font-weight:800;color:#fff;letter-spacing:2px;margin-bottom:4px}
.lo-sub{font-size:13px;color:#ffffff66;margin-bottom:36px}
.lo-card{background:#2c2c2e;border-radius:20px;padding:24px;width:100%;max-width:320px}
.lo-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;text-align:center}
.staff-list{display:flex;flex-direction:column;gap:8px}
.staff-btn{padding:14px 16px;background:#3a3a3c;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;text-align:left;touch-action:manipulation;display:flex;align-items:center;justify-content:space-between;width:100%}
.staff-btn:active{background:#5856d6}
.pin-sec{display:none}.pin-sec.show{display:block}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:16px 0 20px}
.pd{width:18px;height:18px;border-radius:50%;background:#3a3a3c;border:2px solid #555;transition:all 0.15s}
.pd.on{background:#5856d6;border-color:#5856d6}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pp{padding:17px;background:#3a3a3c;border:none;border-radius:12px;color:#fff;font-size:24px;font-weight:600;cursor:pointer;text-align:center;touch-action:manipulation;width:100%}
.pp:active{background:#5856d6}
.pp.del{font-size:18px;color:#ff453a}
.pp.emp{background:transparent;pointer-events:none}
.pin-err{color:#ff453a;font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.lo-back{background:none;border:none;color:#ffffff55;font-size:13px;cursor:pointer;margin-top:14px;width:100%;text-align:center;touch-action:manipulation;padding:6px}
/* TOPBAR */
.topbar{background:#1c1c1e;padding:12px 16px 10px;position:sticky;top:0;z-index:100}
.topbar-row{display:flex;justify-content:space-between;align-items:flex-start}
.brand{font-size:13px;font-weight:700;color:#ffffffaa;letter-spacing:0.5px}
.user-row{display:flex;align-items:center;gap:6px;margin-top:3px}
.user-name{font-size:11px;color:#34c759;font-weight:600}
.logout-btn{background:none;border:none;color:#ff453a;font-size:11px;cursor:pointer;padding:2px 4px;touch-action:manipulation}
.clock-time{font-size:20px;font-weight:700;color:#fff;text-align:right;font-variant-numeric:tabular-nums}
.clock-date{font-size:11px;color:#ffffff88;text-align:right;margin-top:1px}
/* STORE */
.store-wrap{background:#2c2c2e;padding:10px 16px}
.store-label{font-size:11px;font-weight:700;color:#ffffff88;letter-spacing:0.5px;margin-bottom:6px}
.store-btns{display:flex;gap:8px}
.store-btn{flex:1;padding:10px;border-radius:12px;border:1.5px solid #3a3a3c;background:#3a3a3c;color:#ffffffaa;font-size:14px;font-weight:600;cursor:pointer;text-align:center;touch-action:manipulation}
.store-btn.active{background:#5856d6;border-color:#5856d6;color:#fff}
/* EMERGENCY */
.emer-btn-wrap{background:#2c2c2e;padding:0 16px 12px}
.emer-btn{width:100%;padding:12px;background:#ff3b30;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation}
.emer-page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#f2f2f7;z-index:200;overflow-y:auto}
.emer-page.show{display:block}
.emer-top{background:#ff3b30;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.emer-back-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:14px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;touch-action:manipulation}
.emer-body{padding:16px}
.emer-info{background:#fff0f0;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#c0392b;font-weight:500;border:1px solid #ffb3b3}
.emer-sec{font-size:12px;font-weight:700;color:#8e8e93;letter-spacing:0.5px;text-transform:uppercase;margin:14px 0 8px}
.emer-search-inp{width:100%;padding:10px 14px;border:1.5px solid #d1d1d6;border-radius:12px;font-size:16px;color:#1c1c1e;background:#fff;margin-bottom:12px}
.emer-search-inp:focus{outline:none;border-color:#ff3b30}
.emer-items-list{background:#fff;border-radius:12px;border:1px solid #e5e5ea;overflow:hidden;max-height:220px;overflow-y:auto}
.emer-item{padding:11px 14px;border-bottom:1px solid #f5f5f7;cursor:pointer;display:flex;justify-content:space-between;align-items:center;touch-action:manipulation}
.emer-item:last-child{border-bottom:none}
.emer-item.selected{background:#fff0f0}
.emer-item-zh{font-size:14px;font-weight:600;color:#1c1c1e}
.emer-item-de{font-size:11px;color:#8e8e93;margin-top:1px}
.emer-item-sup{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;background:#fff0f0;color:#c00;flex-shrink:0;margin-left:8px}
.emer-empty-txt{text-align:center;padding:20px;color:#8e8e93;font-size:13px}
.sel-items{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.sel-card{background:#fff;border-radius:12px;border:1.5px solid #ffb3b3;padding:12px 14px}
.sel-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sel-zh{font-size:14px;font-weight:600;color:#1c1c1e}
.sel-remove{background:#ff3b30;color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;touch-action:manipulation}
.sel-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.sel-lbl{font-size:12px;color:#8e8e93;white-space:nowrap}
.sel-reason{flex:1;padding:7px 10px;border:1.5px solid #d1d1d6;border-radius:8px;font-size:14px;color:#1c1c1e;background:#f9f9f9}
.sel-note{width:100%;padding:7px 10px;border:1.5px solid #d1d1d6;border-radius:8px;font-size:14px;color:#1c1c1e;background:#f9f9f9;margin-top:6px;resize:none}
.emer-submit{width:100%;padding:15px;background:#ff3b30;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:14px;cursor:pointer;margin-top:8px;touch-action:manipulation}
.emer-result{background:#fff0f0;border-radius:12px;border:1.5px solid #ffb3b3;padding:14px;margin-top:14px;display:none}
.emer-result.show{display:block}
.emer-result-box{font-size:13px;color:#3c3c43;white-space:pre-wrap;line-height:1.6;max-height:200px;overflow-y:auto}
.emer-copy{width:100%;padding:11px;background:#ff3b30;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:10px;touch-action:manipulation}
/* TODAY */
.today-bar{background:#1c1c1e;padding:8px 16px 12px}
.today-lbl{font-size:11px;font-weight:700;color:#ffffff88;letter-spacing:0.5px;margin-bottom:6px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 10px;border-radius:10px;font-size:12px;font-weight:600;touch-action:manipulation}
.chip.urgent{background:#ff3b30;color:#fff}
.chip.warn{background:#ff9500;color:#fff}
.chip.info{background:#5856d6;color:#fff}
.chip.muted{background:#3a3a3c;color:#ffffff66}
/* COUNTDOWN */
.cd-strip{background:#2c2c2e;padding:8px 12px;display:flex;gap:8px;overflow-x:auto}
.cd-strip::-webkit-scrollbar{display:none}
.cd-card{flex-shrink:0;background:#3a3a3c;border-radius:10px;padding:7px 12px;min-width:110px}
.cd-name{font-size:10px;font-weight:700;color:#ffffff88}
.cd-dl{font-size:10px;color:#fff;margin-top:1px}
.cd-ct{font-size:13px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
.cd-ct.red{color:#ff453a}.cd-ct.orange{color:#ff9f0a}.cd-ct.green{color:#30d158}
/* BANNER */
.banner{margin:10px 16px;border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;display:none}
.banner.show{display:block}
.banner.urgent{background:#fff0f0;color:#c0392b;border:1.5px solid #ffb3b3}
.banner-ttl{font-size:14px;font-weight:700;margin-bottom:3px}
/* STATS */
.stats-row{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #e5e5ea}
.stat{flex:1;background:#f2f2f7;border-radius:10px;padding:8px 6px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:#1c1c1e}
.stat-l{font-size:11px;color:#8e8e93;margin-top:2px}
.prog-wrap{height:4px;background:#e5e5ea}
.prog-fill{height:4px;background:#5856d6;transition:width 0.3s}
/* VIEW TOGGLE */
.view-toggle{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid #e5e5ea;overflow-x:auto}
.view-toggle::-webkit-scrollbar{display:none}
.vt-btn{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;border:1px solid #d1d1d6;background:#f2f2f7;color:#3c3c43;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.vt-btn.active{background:#5856d6;border-color:#5856d6;color:#fff}
/* TABS */
.tabs-wrap{background:#fff;border-bottom:1px solid #e5e5ea;padding:0 12px;overflow-x:auto;white-space:nowrap}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs-inner{display:inline-flex;gap:4px;padding:8px 0}
.tab{display:inline-flex;flex-direction:column;align-items:center;padding:6px 14px;border-radius:12px;font-size:12px;font-weight:600;color:#3c3c43;background:#f2f2f7;border:none;cursor:pointer;white-space:nowrap;gap:1px;touch-action:manipulation}
.tab.active{background:#5856d6;color:#fff}
.tab-sub{font-size:10px;font-weight:500;opacity:0.7}
.tab.urgent{background:#fff0f0;color:#c00;border:1.5px solid #ffb3b3}
.tab.urgent.active{background:#ff3b30;color:#fff;border-color:#ff3b30}
/* ITEMS */
.sec-hdr{padding:12px 16px 5px;font-size:11px;font-weight:700;color:#8e8e93;letter-spacing:0.5px;text-transform:uppercase;background:#f2f2f7;display:flex;align-items:center;gap:6px}
.loc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-card{background:#fff;border-bottom:1px solid #f2f2f7;display:flex;align-items:center;padding:12px 14px;gap:10px;min-height:64px}
.item-card.done .item-zh{color:#8e8e93}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #d1d1d6;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.chk.on{background:#34c759;border-color:#34c759}
.chk.on::after{content:'';width:6px;height:10px;border:2.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block}
.item-info{flex:1;min-width:0}
.item-zh{font-size:15px;font-weight:600;color:#1c1c1e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-de{font-size:11px;color:#8e8e93;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.boss-tag{display:inline-block;background:#fff8ee;color:#a05000;border:1px solid #ffd8a0;font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;margin-left:5px}
.today-tag{display:inline-block;background:#edfbf1;color:#1c7c3e;border:1px solid #a8e6c0;font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;margin-left:5px}
.qty-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.qty-inp{width:70px;text-align:center;font-size:16px!important;font-weight:600;color:#1c1c1e;padding:6px;border:1.5px solid #d1d1d6;border-radius:10px;background:#f2f2f7;touch-action:manipulation}
.qty-inp:focus{outline:none;border-color:#5856d6;background:#eeeeff}
.qty-inp.filled{border-color:#34c759;background:#edfbf1;color:#1c7c3e}
.unit-sel{font-size:14px;padding:4px 6px;border:1.5px solid #d1d1d6;border-radius:8px;background:#f2f2f7;color:#1c1c1e;touch-action:manipulation;max-width:80px}
.unit-sel.filled{border-color:#34c759;background:#edfbf1;color:#1c7c3e}
/* SUBMIT */
.submit-area{padding:16px}
.submit-btn{width:100%;padding:15px;background:#5856d6;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:14px;cursor:pointer;touch-action:manipulation}
.result-panel{display:none;padding:16px;background:#fff}
.result-panel.show{display:block}
.result-ttl{font-size:16px;font-weight:700;color:#1c1c1e;margin-bottom:6px}
.result-sub{font-size:13px;color:#8e8e93;margin-bottom:10px}
.result-box{background:#f2f2f7;border-radius:12px;padding:12px 14px;font-size:13px;color:#3c3c43;white-space:pre-wrap;line-height:1.6;max-height:280px;overflow-y:auto}
.copy-btn{margin-top:10px;width:100%;padding:12px;background:#f2f2f7;color:#5856d6;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;touch-action:manipulation}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.78);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<!-- LOGIN -->
<div class="lo" id="lo">
  <div class="lo-brand">KOCHI</div>
  <div class="lo-sub">Restaurant · Düsseldorf</div>
  <div class="lo-card">
    <div id="lo-step1"><div class="lo-title">选择你的账号</div><div class="staff-list" id="staff-list"></div></div>
    <div id="lo-step2" style="display:none">
      <div class="lo-title" id="pin-greet">输入PIN码</div>
      <div class="pin-dots"><div class="pd" id="pd0"></div><div class="pd" id="pd1"></div><div class="pd" id="pd2"></div><div class="pd" id="pd3"></div></div>
      <div class="pin-pad">
        <button type="button" class="pp" data-n="1">1</button><button type="button" class="pp" data-n="2">2</button><button type="button" class="pp" data-n="3">3</button>
        <button type="button" class="pp" data-n="4">4</button><button type="button" class="pp" data-n="5">5</button><button type="button" class="pp" data-n="6">6</button>
        <button type="button" class="pp" data-n="7">7</button><button type="button" class="pp" data-n="8">8</button><button type="button" class="pp" data-n="9">9</button>
        <button type="button" class="pp emp"></button><button type="button" class="pp" data-n="0">0</button><button type="button" class="pp del" id="pin-del">⌫</button>
      </div>
      <div class="pin-err" id="pin-err"></div>
      <button type="button" class="lo-back" id="lo-back">← 重新选择账号</button>
    </div>
  </div>
</div>
<!-- MAIN -->
<div class="topbar">
  <div class="topbar-row">
    <div><div class="brand">KOCHI RESTAURANT</div><div class="user-row"><span class="user-name" id="user-name"></span><button type="button" class="logout-btn" id="logout-btn" style="display:none">退出</button></div></div>
    <div><div class="clock-time" id="clk">--:--</div><div class="clock-date" id="clk-date">--</div></div>
  </div>
</div>
<div class="store-wrap">
  <div class="store-label">选择门店 · Store</div>
  <div class="store-btns">
    <button type="button" class="store-btn active" id="btn-wetter">Kochi Wetter</button>
    <button type="button" class="store-btn" id="btn-bismarck">Kochi Bismarck</button>
  </div>
</div>
<div class="emer-btn-wrap"><button type="button" class="emer-btn" id="emer-open">🚨 库存告急上报</button></div>
<!-- EMERGENCY PAGE -->
<div class="emer-page" id="emer-page">
  <div class="emer-top"><button type="button" class="emer-back-btn" id="emer-back">← 返回</button><span style="font-size:16px;font-weight:700;color:#fff">🚨 库存告急上报</span></div>
  <div class="emer-body">
    <div class="emer-info">用于紧急情况：某品项今天售罄或明天不够用，需要老板立即安排补货。</div>
    <div class="emer-sec">搜索品项</div>
    <input type="text" class="emer-search-inp" id="emer-search" placeholder="输入中文名搜索，例：和牛、炸油…">
    <div class="emer-items-list" id="emer-items-list"><div class="emer-empty-txt">输入关键词搜索品项</div></div>
    <div class="emer-sec" id="emer-sel-sec" style="display:none">已选品项</div>
    <div class="sel-items" id="sel-items"></div>
    <button type="button" class="emer-submit" id="emer-submit" disabled>提交告急报告</button>
    <div class="emer-result" id="emer-result">
      <div style="font-size:14px;font-weight:700;color:#c0392b;margin-bottom:8px">✅ 告急已上报</div>
      <div class="emer-result-box" id="emer-result-box"></div>
      <button type="button" class="emer-copy" id="emer-copy">复制内容</button>
    </div>
  </div>
</div>
<div class="today-bar"><div class="today-lbl">今日任务</div><div class="chips" id="chips"></div></div>
<div class="cd-strip" id="cd-strip"></div>
<div id="banner-area"></div>
<div class="stats-row">
  <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">今日品项</div></div>
  <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">已盘点</div></div>
  <div class="stat"><div class="stat-n" id="s-pct">0%</div><div class="stat-l">完成率</div></div>
</div>
<div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
<div class="view-toggle" id="view-toggle">
  <button type="button" class="vt-btn active" data-view="supplier">按供应商</button>
  <button type="button" class="vt-btn" data-view="location">按位置</button>
  <button type="button" class="vt-btn" data-view="all">全部品项</button>
</div>
<div class="tabs-wrap" id="tabs-wrap"><div class="tabs-inner" id="tabs"></div></div>
<div id="list"></div>
<div class="submit-area"><button type="button" class="submit-btn" id="submit-btn">✓ 提交盘点结果</button></div>
<div class="result-panel" id="result-panel">
  <div class="result-ttl">✅ 提交成功</div>
  <div class="result-sub">数据已保存，老板端可查看。</div>
  <div class="result-box" id="result-box"></div>
  <button type="button" class="copy-btn" id="copy-btn">复制内容</button>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://vadehcocwrjsbqvssqkk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhZGVoY29jd3Jqc2JxdnNzcWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTE4MjUsImV4cCI6MjA5NDQyNzgyNX0.xfPAuO6qMNYe7Z2R2nDOKmW5OHIfWTpcPcz8EQMiGdM';
async function sbGet(k){try{const r=await fetch(SB_URL+'/rest/v1/inventory?key=eq.'+encodeURIComponent(k)+'&select=value',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});const d=await r.json();if(d&&d.length>0)return{value:d[0].value};return null;}catch(e){return null;}}
async function sbSet(k,v){try{const val=typeof v==='string'?v:JSON.stringify(v);await fetch(SB_URL+'/rest/v1/inventory',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify({key:k,value:val,updated_at:new Date().toISOString()})});return true;}catch(e){return false;}}

const KEYS={items:'kochi_items_v3',suppliers:'kochi_suppliers_v1',staff:'kochi_staff_v1',log:'kochi_login_log_v1',emer:'kochi_emergency_v1',flags:'kochi_boss_flags_v1'};
const WDF=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  try{const r=await sbGet(KEYS.log);const logs=r&&r.value?JSON.parse(r.value):[];logs.unshift({staffId:currentStaff.id,staffName:currentStaff.name,store:curStore,action,detail,time:Date.now(),timeStr:new Date().toLocaleString('zh-CN')});if(logs.length>200)logs.splice(200);await sbSet(KEYS.log,JSON.stringify(logs));}catch(e){}
}

async function saveInv(store,supId,data){
  await sbSet('kochi_inv_'+store+'_'+supId,JSON.stringify({ts:Date.now(),data}));
}

// CLOCK
function tickClock(){
  const n=new Date();
  document.getElementById('clk').textContent=p2(n.getHours())+':'+p2(n.getMinutes())+':'+p2(n.getSeconds());
  document.getElementById('clk-date').textContent=n.getFullYear()+'年'+MM[n.getMonth()]+n.getDate()+'日 '+WDF[n.getDay()];
  renderCountdowns();renderTasks();
}

// COUNTDOWNS
function nextDL(sup){
  const now=new Date(),nx=new Date(now);
  const day=sup.deadlineDay||1,hour=sup.deadlineHour||12;
  let diff=(day-now.getDay()+7)%7;
  if(diff===0){const c=new Date(now);c.setHours(hour,0,0,0);if(now>=c)diff=7;}
  nx.setDate(now.getDate()+diff);nx.setHours(hour,0,0,0);return nx;
}
function fmtMs(ms){if(ms<=0)return'已过期';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);if(h>48)return Math.floor(h/24)+'天'+h%24+'h';if(h>0)return h+'h'+p2(m)+'m';return p2(m)+'m'+p2(s)+'s';}
function renderCountdowns(){
  const strip=document.getElementById('cd-strip');if(!strip)return;strip.innerHTML='';
  suppliers.forEach(sup=>{
    const nx=nextDL(sup),ms=nx-new Date(),hrs=ms/3600000;
    const cls=hrs<6?'red':hrs<24?'orange':'green';
    const d=document.createElement('div');d.className='cd-card';
    d.innerHTML='<div class="cd-name">'+sup.name+'</div><div class="cd-dl">'+WD[sup.deadlineDay||1]+' '+p2(sup.deadlineHour||12)+':00</div><div class="cd-ct '+cls+'">'+fmtMs(ms)+'</div>';
    strip.appendChild(d);
  });
}

// TODAY TASKS
function renderTasks(){
  const now=new Date(),wd=now.getDay(),hr=now.getHours();
  const chips=document.getElementById('chips');chips.innerHTML='';
  const tasks=[];
  suppliers.forEach(sup=>{
    const dl=sup.deadlineDay||1,dlh=sup.deadlineHour||12;
    const prevDay=(dl-1+7)%7;
    if((wd===prevDay&&hr>=22)||(wd===dl&&hr<dlh)){
      const urgent=wd===dl&&hr<dlh;
      tasks.push({t:(urgent?'⚠️ ':'')+'盘点 '+sup.name,c:urgent?'urgent':'warn',supId:sup.id});
    }
  });
  if(!tasks.length)tasks.push({t:'今日暂无紧急任务',c:'muted'});
  tasks.forEach(t=>{
    const c=document.createElement('div');c.className='chip '+t.c;c.textContent=t.t;
    if(t.supId){c.addEventListener('click',()=>switchSupplier(t.supId));c.addEventListener('touchend',e=>{e.preventDefault();switchSupplier(t.supId);});}
    chips.appendChild(c);
  });
  // banner
  const ba=document.getElementById('banner-area');ba.innerHTML='';
  const urgentSups=suppliers.filter(sup=>{const dl=sup.deadlineDay||1,dlh=sup.deadlineHour||12,prevDay=(dl-1+7)%7;return(wd===prevDay&&hr>=22)||(wd===dl&&hr<dlh);});
  if(urgentSups.length){
    const b=document.createElement('div');b.className='banner show urgent';
    b.innerHTML='<div class="banner-ttl">⚠️ 紧急提醒</div>'+urgentSups.map(s=>s.name+' 截单临近').join(' · ');
    ba.appendChild(b);
  }
}

// TABS - dynamic from suppliers
function renderTabs(){
  const tabs=document.getElementById('tabs');tabs.innerHTML='';
  suppliers.forEach((sup,i)=>{
    const btn=document.createElement('button');btn.type='button';btn.className='tab'+(i===0?' active':'');
    btn.dataset.supId=sup.id;
    btn.innerHTML=sup.name+'<span class="tab-sub">截单'+WD[sup.deadlineDay||1]+p2(sup.deadlineHour||12)+':00</span>';
    tabs.appendChild(btn);
  });
  if(!curSupId&&suppliers.length)curSupId=suppliers[0].id;
  // mark active tab
  tabs.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.supId===curSupId));
  tabs.addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;switchSupplier(t.dataset.supId);});
  tabs.addEventListener('touchend',e=>{const t=e.target.closest('.tab');if(!t)return;e.preventDefault();switchSupplier(t.dataset.supId);});
}

function switchSupplier(supId){
  curSupId=supId;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.supId===supId));
  renderList();
}

// FREQ CHECK
function shouldShow(item){
  // Used only for today's task chips - always show items in list
  const fk=item.sup+'|'+item.zh;
  if(bossFlags[fk])return true;
  const freq=item.freq||'every_week_14';
  const now=new Date(),wd=now.getDay();
  if(freq==='every_day')return true;
  if(freq==='every_2days')return true;
  if(freq==='every_3days')return true;
  if(freq==='every_week_1')return wd===1;
  if(freq==='every_week_14')return wd===1||wd===4;
  if(freq==='every_2weeks'){const weekNum=Math.floor(now.getTime()/(7*24*3600*1000));return wd===1&&weekNum%2===0;}
  return true;
}

function isDueToday(item){
  return shouldShow(item);
}

// RENDER LIST
function renderList(){
  const list=document.getElementById('list');list.innerHTML='';
  let totalShown=0,done=0;

  if(curView==='location'){
    const byLoc={};
    items.forEach(item=>{
      const loc=item.loc||'办公室库房';
      if(!byLoc[loc])byLoc[loc]=[];
      byLoc[loc].push(item);
    });
    LOC_ORDER.forEach(loc=>{
      const its=byLoc[loc];if(!its||!its.length)return;
      const hdr=document.createElement('div');hdr.className='sec-hdr';
      hdr.innerHTML='<span class="loc-dot" style="background:'+(LOC_COLORS[loc]||'#8e8e93')+'"></span>'+loc+' <span style="color:#c7c7cc;font-size:10px">('+its.length+')</span>';
      list.appendChild(hdr);
      its.forEach(item=>{totalShown++;const k=curStore+'|'+item.sup+'|'+item.zh;if((vals[k]||'')!=='')done++;appendCard(list,item,k);});
    });
  } else if(curView==='all'){
    // Group by supplier
    suppliers.forEach(sup=>{
      const its=items.filter(i=>i.sup===sup.id);
      if(!its.length)return;
      // Group by cat
      const byCat={};
      its.forEach(i=>{if(!byCat[i.cat])byCat[i.cat]=[];byCat[i.cat].push(i);});
      Object.keys(byCat).forEach(cat=>{
        const hdr=document.createElement('div');hdr.className='sec-hdr';hdr.textContent=sup.name+' · '+cat;list.appendChild(hdr);
        byCat[cat].forEach(item=>{totalShown++;const k=curStore+'|'+item.sup+'|'+item.zh;if((vals[k]||'')!=='')done++;appendCard(list,item,k);});
      });
    });
  } else {
    // By supplier tab
    const supItems=items.filter(i=>i.sup===curSupId);
    const byCat={};
    supItems.forEach(i=>{if(!byCat[i.cat])byCat[i.cat]=[];byCat[i.cat].push(i);});
    Object.keys(byCat).forEach(cat=>{
      const its=byCat[cat];
      const hdr=document.createElement('div');hdr.className='sec-hdr';
      const loc=its[0]&&its[0].loc?its[0].loc:'';
      hdr.innerHTML=(loc?'<span class="loc-dot" style="background:'+(LOC_COLORS[loc]||'#8e8e93')+'"></span>':'')+cat;
      list.appendChild(hdr);
      its.forEach(item=>{totalShown++;const k=curStore+'|'+item.sup+'|'+item.zh;if((vals[k]||'')!=='')done++;appendCard(list,item,k);});
    });
  }

  document.getElementById('s-total').textContent=totalShown;
  document.getElementById('s-done').textContent=done;
  const pct=totalShown>0?Math.round(done/totalShown*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog').style.width=pct+'%';
  bindItemEvents();
}

function appendCard(list,item,key){
  const units=item.units||['KG'];
  if(!usel[key])usel[key]=units[0];
  const val=vals[key]||'';
  const isBossFlag=bossFlags[item.sup+'|'+item.zh];
  const bossTag=isBossFlag?'<span class="boss-tag">老板要求</span>':'';
  const todayTag=isDueToday(item)&&!isBossFlag?'<span class="today-tag">今日</span>':'';
  const card=document.createElement('div');card.className='item-card'+(val!==''?' done':'');
  // Unit selector: dropdown if multiple units, otherwise plain text
  const unitCtrl=units.length>1
    ?'<select class="unit-sel'+(val!==''?' filled':'')+'" data-key="'+key+'">'+units.map(u=>'<option'+(u===usel[key]?' selected':'')+'>'+u+'</option>').join('')+'</select>'
    :'<span style="font-size:12px;color:#8e8e93">'+units[0]+'</span>';
  card.innerHTML=
    '<div class="chk'+(val!==''?' on':'')+'" id="c'+key.replace(/[|]/g,'_')+'"></div>'+
    '<div class="item-info"><div class="item-zh">'+item.zh+bossTag+todayTag+'</div><div class="item-de">'+item.de+'</div></div>'+
    '<div class="qty-wrap"><input class="qty-inp'+(val!==''?' filled':'')+'" type="number" min="0" step="0.01" inputmode="decimal" placeholder="数量" value="'+val+'" data-key="'+key+'">'+unitCtrl+'</div>';
  list.appendChild(card);
}

function bindItemEvents(){
  const list=document.getElementById('list');
  list.querySelectorAll('.qty-inp').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const k=inp.dataset.key;vals[k]=inp.value.trim();
      const card=inp.closest('.item-card');
      const chk=document.getElementById('c'+k.replace(/[|]/g,'_'));
      const has=vals[k]!=='';
      card.classList.toggle('done',has);inp.classList.toggle('filled',has);
      if(chk)chk.classList.toggle('on',has);
      // also update unit selector color
      const usel_el=card.querySelector('.unit-sel');
      if(usel_el)usel_el.classList.toggle('filled',has);
      updateStats();
    });
  });
  list.querySelectorAll('.unit-sel').forEach(sel=>{
    sel.addEventListener('change',()=>{usel[sel.dataset.key]=sel.value;});
  });
}

function updateStats(){
  let total=0,done=0;
  document.getElementById('list').querySelectorAll('.qty-inp').forEach(inp=>{total++;if((vals[inp.dataset.key]||'')!=='')done++;});
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog').style.width=pct+'%';
}

// LOGIN
function renderStaffList(){
  const el=document.getElementById('staff-list');el.innerHTML='';
  staffList.forEach(s=>{
    const btn=document.createElement('button');btn.type='button';btn.className='staff-btn';
    btn.innerHTML=s.name+'<span style="color:#ffffff44">›</span>';
    const fn=()=>selectStaff(s.id);
    btn.addEventListener('click',fn);btn.addEventListener('touchend',e=>{e.preventDefault();fn();});
    el.appendChild(btn);

function selectStaff(id){
  selStaffId=id;pinBuf='';updatePinDots();
  const s=staffList.find(x=>x.id===id);if(!s)return;
  document.getElementById('pin-greet').textContent='你好，'+s.name+'！';
  document.getElementById('lo-step1').style.display='none';
  document.getElementById('lo-step2').style.display='block';
  document.getElementById('pin-err').textContent='';
}
function updatePinDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('on',i<pinBuf.length);}
async function checkPin(){
  const s=staffList.find(x=>x.id===selStaffId);if(!s)return;
  if(pinBuf===s.pin){
    currentStaff=s;
    document.getElementById('lo').style.display='none';
    document.getElementById('user-name').textContent=s.name;
    document.getElementById('logout-btn').style.display='inline-block';
    await logAction('登录','员工登录系统');
    renderList();renderTasks();
  }else{
    document.getElementById('pin-err').textContent='PIN码错误，请重试';
    pinBuf='';updatePinDots();
  }
}
document.querySelectorAll('.pp[data-n]').forEach(btn=>{
  const fn=()=>{if(pinBuf.length>=4)return;pinBuf+=btn.dataset.n;updatePinDots();if(pinBuf.length===4)setTimeout(checkPin,150);};
  btn.addEventListener('click',fn);btn.addEventListener('touchend',e=>{e.preventDefault();fn();});
});
document.getElementById('pin-del').addEventListener('click',()=>{pinBuf=pinBuf.slice(0,-1);updatePinDots();document.getElementById('pin-err').textContent='';});
document.getElementById('pin-del').addEventListener('touchend',e=>{e.preventDefault();pinBuf=pinBuf.slice(0,-1);updatePinDots();});
document.getElementById('lo-back').addEventListener('click',()=>{document.getElementById('lo-step1').style.display='block';document.getElementById('lo-step2').style.display='none';selStaffId=null;pinBuf='';});
document.getElementById('lo-back').addEventListener('touchend',e=>{e.preventDefault();document.getElementById('lo-back').click();});
document.getElementById('logout-btn').addEventListener('click',()=>{
  currentStaff=null;selStaffId=null;pinBuf='';
  document.getElementById('lo').style.display='flex';
  document.getElementById('lo-step1').style.display='block';
  document.getElementById('lo-step2').style.display='none';
  document.getElementById('user-name').textContent='';
  document.getElementById('logout-btn').style.display='none';

});
document.getElementById('logout-btn').addEventListener('touchend',e=>{e.preventDefault();document.getElementById('logout-btn').click();});

// SUBMIT
document.getElementById('submit-btn').addEventListener('click',async()=>{
  const btn=document.getElementById('submit-btn');
  const filledKeys=Object.keys(vals).filter(k=>k.startsWith(curStore+'|')&&vals[k]!=='');
  if(!filledKeys.length){showToast('请先填写库存数量');return;}
  btn.textContent='保存中...';
  const supId=curSupId;
  const sup=suppliers.find(s=>s.id===supId);
  const supName=sup?sup.name:supId;
  const supItems=items.filter(i=>i.sup===supId);
  const byCat={};
  supItems.forEach(i=>{if(!byCat[i.cat])byCat[i.cat]=[];byCat[i.cat].push(i);});
  const data=[];
  let lines=['【Kochi 库存盘点报告】','门店：'+(curStore==='wetter'?'Kochi Wetter':'Kochi Bismarck'),'供应商：'+supName,'日期：'+new Date().toLocaleString('zh-CN'),''];
  Object.keys(byCat).forEach(cat=>{
    lines.push('▸ '+cat);
    const catItems=[];
    byCat[cat].forEach(item=>{
      const k=curStore+'|'+item.sup+'|'+item.zh;
      const v=vals[k]||'',u=usel[k]||item.units[0];
      if(v)lines.push('  '+item.zh+': '+v+' '+u);
      catItems.push({zh:item.zh,val:v,unit:u});
    });
    data.push({cat,items:catItems});
    lines.push('');
  });
  await saveInv(curStore,supId,data);
  // Clear boss flags
  let changed=false;
  supItems.forEach(item=>{const fk=item.sup+'|'+item.zh;if(bossFlags[fk]){delete bossFlags[fk];changed=true;}});
  if(changed)await sbSet(KEYS.flags,JSON.stringify(bossFlags));
  await logAction('盘点提交','供应商：'+supName);
  btn.textContent='✓ 提交盘点结果';
  document.getElementById('result-box').textContent=lines.join('\n');
  document.getElementById('result-panel').classList.add('show');
  document.getElementById('result-panel').scrollIntoView({behavior:'smooth'});
  showToast('数据已同步到老板端');
});
document.getElementById('copy-btn').addEventListener('click',()=>{
  const txt=document.getElementById('result-box').textContent;
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>showToast('已复制'));
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制');}
});

function renderEmerSearch(q){
  const el=document.getElementById('emer-items-list');
  if(!q){el.innerHTML='<div class="emer-empty-txt">输入关键词搜索品项</div>';return;}
  const hits=items.filter(i=>i.zh.includes(q)||i.de.toLowerCase().includes(q.toLowerCase())).slice(0,15);
  if(!hits.length){el.innerHTML='<div class="emer-empty-txt">未找到</div>';return;}
  el.innerHTML='';
  hits.forEach(item=>{
    const k=item.zh+'|'+item.sup;
    const d=document.createElement('div');d.className='emer-item'+(emerSel[k]?' selected':'');
    const sup=suppliers.find(s=>s.id===item.sup);
    d.innerHTML='<div><div class="emer-item-zh">'+item.zh+'</div><div class="emer-item-de">'+item.de+'</div></div><span class="emer-item-sup">'+(sup?sup.name:item.sup)+'</span>';
    const fn=()=>{if(!emerSel[k])emerSel[k]={zh:item.zh,de:item.de,sup:item.sup,reason:REASONS[0],note:''};renderEmerSelected();renderEmerSearch(document.getElementById('emer-search').value);};
    d.addEventListener('click',fn);d.addEventListener('touchend',e=>{e.preventDefault();fn();});
    el.appendChild(d);
  });
}

function renderEmerSelected(){
  const wrap=document.getElementById('sel-items');
  const sec=document.getElementById('emer-sel-sec');
  const keys=Object.keys(emerSel);
  sec.style.display=keys.length?'block':'none';
  document.getElementById('emer-submit').disabled=keys.length===0;
  wrap.innerHTML='';
  keys.forEach(k=>{
    const item=emerSel[k];
    const card=document.createElement('div');card.className='sel-card';
    card.innerHTML='<div class="sel-top"><div class="sel-zh">'+item.zh+'</div><button type="button" class="sel-remove" data-key="'+k+'">移除</button></div>'+
      '<div class="sel-row"><span class="sel-lbl">原因</span><select class="sel-reason" data-key="'+k+'">'+REASONS.map(r=>'<option'+(item.reason===r?' selected':'')+'>'+r+'</option>').join('')+'</select></div>'+
      '<textarea class="sel-note" data-key="'+k+'" placeholder="补充说明（可选）" rows="2">'+item.note+'</textarea>';
    wrap.appendChild(card);
  });
  wrap.querySelectorAll('.sel-remove').forEach(b=>{
    const fn=()=>{delete emerSel[b.dataset.key];renderEmerSelected();renderEmerSearch(document.getElementById('emer-search').value);};
    b.addEventListener('click',fn);b.addEventListener('touchend',e=>{e.preventDefault();fn();});
  });
  wrap.querySelectorAll('.sel-reason').forEach(s=>{s.addEventListener('change',()=>{emerSel[s.dataset.key].reason=s.value;});});
  wrap.querySelectorAll('.sel-note').forEach(t=>{t.addEventListener('input',()=>{emerSel[t.dataset.key].note=t.value;});});
}

document.getElementById('emer-submit').addEventListener('click',async()=>{
  const keys=Object.keys(emerSel);if(!keys.length)return;
  const store=curStore==='wetter'?'Kochi Wetter':'Kochi Bismarck';
  const now=new Date(),timeStr=now.toLocaleString('zh-CN');
  const its=keys.map(k=>emerSel[k]);
  try{const r=await sbGet(KEYS.emer);const list=r&&r.value?JSON.parse(r.value):[];list.unshift({store,time:now.getTime(),timeStr,items:its});if(list.length>50)list.splice(50);await sbSet(KEYS.emer,JSON.stringify(list));}catch(e){}
  await logAction('告急上报','上报'+its.length+'个品项');
  const lines=['🚨【库存告急通知】','门店：'+store,'时间：'+timeStr,''];
  its.forEach((it,i)=>{lines.push((i+1)+'. '+it.zh);lines.push('   原因：'+it.reason);if(it.note)lines.push('   备注：'+it.note);});
  lines.push('');lines.push('请老板尽快安排补货！');
  document.getElementById('emer-result-box').textContent=lines.join('\n');
  document.getElementById('emer-result').classList.add('show');
  document.getElementById('emer-submit').disabled=true;
  document.getElementById('emer-submit').textContent='✅ 已上报';
});
document.getElementById('emer-copy').addEventListener('click',()=>{
  const txt=document.getElementById('emer-result-box').textContent;
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>showToast('已复制'));
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制');}
});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
